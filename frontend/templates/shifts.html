{% extends "base.html" %}
{% block title %}Shifts{% endblock %}

{% block content %}
<div class="page-header d-flex justify-content-between align-items-start">
  <div>
    <h1><i class="bi bi-clock-history me-2" style="color:var(--fuel)"></i>Shift Management</h1>
    <p>Track employee shifts and reconcile cash</p>
  </div>
  <div class="d-flex gap-2" id="shift-btn-area"></div>
</div>

<!-- Active Shift Banner -->
<div id="active-shift-banner" style="display:none;" class="mb-3 p-3 rounded"
     style="background: rgba(255,107,0,.08); border: 1px solid rgba(255,107,0,.2);">
</div>

<!-- Shift History Table -->
<div class="table-wrapper">
  <div class="p-3" style="border-bottom:1px solid var(--border);">
    <div style="font-family:'Rajdhani',sans-serif; font-size:1.1rem; font-weight:700; color:#fff;">
      <i class="bi bi-list-ul me-2" style="color:var(--fuel)"></i>Shift History
    </div>
  </div>
  <table class="table mb-0">
    <thead><tr>
      <th>Shift #</th><th>Employee</th><th>Start</th><th>End</th>
      <th>Transactions</th><th>Total Sales</th><th>Cash</th><th>Card</th><th>Status</th>
    </tr></thead>
    <tbody id="shift-table-body"><tr><td colspan="9" class="text-center" style="padding:2rem; color:#4a5568;">Loading...</td></tr></tbody>
  </table>
</div>
{% endblock %}

{% block scripts %}
<script>
async function checkActiveShift() {
  const res = await fetch('/api/shifts/active', {credentials:'include'});
  const shift = await res.json();
  const banner = document.getElementById('active-shift-banner');
  const btnArea = document.getElementById('shift-btn-area');

  if (shift) {
    banner.style.display = 'block';
    banner.style.cssText += '; background: rgba(255,107,0,.08); border: 1px solid rgba(255,107,0,.2); border-radius:10px;';
    banner.innerHTML = `
      <div class="d-flex justify-content-between align-items-center">
        <div>
          <div style="color:var(--fuel); font-family:'Rajdhani',sans-serif; font-size:1.1rem; font-weight:700;">
            <i class="bi bi-circle-fill me-2" style="font-size:.6rem; animation:pulse 2s infinite;"></i>ACTIVE SHIFT
          </div>
          <div style="font-size:.85rem; color:#8a9bc0;">
            Started: ${new Date(shift.start_time).toLocaleString('en-PK')} &nbsp;|&nbsp;
            Sales so far: <strong style="color:#fff;">₨ ${Number(shift.total_sales).toLocaleString()}</strong> &nbsp;|&nbsp;
            Cash: ₨${Number(shift.cash_collected).toFixed(2)} &nbsp;|&nbsp;
            Card: ₨${Number(shift.card_collected).toFixed(2)}
          </div>
        </div>
      </div>`;
    btnArea.innerHTML = `<button class="btn btn-outline-fuel" onclick="endShift()">
      <i class="bi bi-stop-circle me-1"></i>End Shift</button>`;
  } else {
    banner.style.display = 'none';
    btnArea.innerHTML = `<button class="btn btn-fuel" onclick="startShift()">
      <i class="bi bi-play-circle me-1"></i>Start Shift</button>`;
  }
}
async function loadShifts() {
  const res = await fetch('/api/shifts', {credentials:'include'});
  const shifts = await res.json();
  const tbody = document.getElementById('shift-table-body');
  if (!shifts.length) {
    tbody.innerHTML = `<tr><td colspan="9" class="text-center" style="padding:2rem; color:#4a5568;">No shifts on record</td></tr>`;
    return;
  }
  tbody.innerHTML = shifts.map(s => {
    const statusBadge = s.status === 'active'
      ? `<span class="badge-fuel">Active</span>`
      : `<span class="badge-ok">Closed</span>`;
    const end = s.end_time ? new Date(s.end_time).toLocaleString('en-PK',{hour:'2-digit',minute:'2-digit',month:'short',day:'numeric'}) : '—';
    return `<tr>
      <td style="color:#8a9bc0;">#${s.shift_id}</td>
      <td style="color:var(--fuel); font-weight:500;">${s.full_name}</td>
      <td style="font-size:.82rem;">${new Date(s.start_time).toLocaleString('en-PK',{hour:'2-digit',minute:'2-digit',month:'short',day:'numeric'})}</td>
      <td style="font-size:.82rem;">${end}</td>
      <td>${s.num_transactions}</td>
      <td><strong style="color:var(--fuel);">₨ ${Number(s.total_sales).toLocaleString()}</strong></td>
      <td style="color:#22c55e; font-size:.85rem;">₨ ${Number(s.cash_collected).toFixed(2)}</td>
      <td style="color:#818cf8; font-size:.85rem;">₨ ${Number(s.card_collected).toFixed(2)}</td>
      <td>${statusBadge}</td>
    </tr>`;
  }).join('');
}
async function startShift() {
  const res = await fetch('/api/shifts/start', {method:'POST', credentials:'include'});
  const d = await res.json();
  if (res.ok) { showToast('Shift started!'); checkActiveShift(); loadShifts(); }
  else showToast(d.error, 'error');
}
async function endShift() {
  if (!confirm('End your current shift and close cash reconciliation?')) return;
  const res = await fetch('/api/shifts/end', {method:'POST', credentials:'include'});
  const d = await res.json();
  if (res.ok) {
    showToast(`Shift closed. Total: ₨${Number(d.total_sales).toLocaleString()} | Cash: ₨${Number(d.cash_collected).toFixed(2)} | Card: ₨${Number(d.card_collected).toFixed(2)}`);
    checkActiveShift(); loadShifts();
  } else showToast(d.error, 'error');
}

checkActiveShift(); loadShifts();
</script>
{% endblock %}
