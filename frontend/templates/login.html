<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PSMS – Login</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root { --fuel: #FF6B00; --dark: #0D0F14; --card: #161A22; }
  body { background: var(--dark); font-family: 'Inter', sans-serif; min-height: 100vh;
         display:flex; align-items:center; justify-content:center; }
  .brand { font-family: 'Rajdhani', sans-serif; font-size: 2.4rem; font-weight:700;
           letter-spacing:2px; color:#fff; }
  .brand span { color: var(--fuel); }
  .login-card { background: var(--card); border: 1px solid #2a2f3a; border-radius: 16px;
                padding: 2.5rem; width: 100%; max-width: 420px; }
  .form-control { background: #1e2330; border: 1px solid #2e3545; color: #fff; border-radius: 8px; }
  .form-control:focus { background: #1e2330; border-color: var(--fuel); color:#fff; box-shadow: 0 0 0 0.2rem rgba(255,107,0,.15); }
  .btn-fuel { background: var(--fuel); color: #fff; border:none; border-radius:8px;
              font-family:'Rajdhani',sans-serif; font-size:1.05rem; font-weight:700;
              letter-spacing:1px; padding:.7rem; transition: all .2s; }
  .btn-fuel:hover { background: #e55f00; color:#fff; transform:translateY(-1px); }
  label { color: #8a9bc0; font-size: .85rem; font-weight:500; }
  .tagline { color: #4a5568; font-size: .8rem; letter-spacing:3px; text-transform:uppercase; }
  #alert-box { display:none; }
</style>
</head>
<body>
<div class="login-card text-center">
  <div class="brand">PS<span>MS</span></div>
  <div class="tagline mb-4">Petrol Station Management System</div>

  <div id="alert-box" class="alert alert-danger py-2 text-start" role="alert"></div>

  <div class="text-start">
    <div class="mb-3">
      <label class="form-label">Username</label>
      <input type="text" id="username" class="form-control" placeholder="Enter username" autocomplete="username">
    </div>
    <div class="mb-4">
      <label class="form-label">Password</label>
      <input type="password" id="password" class="form-control" placeholder="Enter password" autocomplete="current-password">
    </div>
    <button class="btn btn-fuel w-100" onclick="doLogin()">SIGN IN</button>
  </div>
  <div class="mt-3" style="color:#3a4455; font-size:.75rem;">
    Default: admin / admin123 &nbsp;|&nbsp; ahmed / cashier123
  </div>
</div>

<script>
async function doLogin() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const alertBox = document.getElementById('alert-box');
  alertBox.style.display = 'none';

  try {
    const res = await fetch('/api/login', {
      method: 'POST', credentials: 'include',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    if (res.ok) {
      window.location.href = '/dashboard';
    } else {
      alertBox.textContent = data.error || 'Login failed';
      alertBox.style.display = 'block';
    }
  } catch(e) {
    alertBox.textContent = 'Cannot connect to server.';
    alertBox.style.display = 'block';
  }
}
document.addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
</script>
</body>
</html>
