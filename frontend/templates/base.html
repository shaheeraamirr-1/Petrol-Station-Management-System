<!-- base_styles.html - included by all pages -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⛽</text></svg>">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PSMS – {% block title %}{% endblock %}</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --fuel: #FF6B00; --fuel-dim: rgba(255,107,0,.12);
    --dark: #0D0F14; --sidebar: #12151C; --card: #161A22;
    --border: #1e2330; --text: #c5cdd8; --muted: #4a5568;
  }
  * { box-sizing: border-box; }
  body { background: var(--dark); color: var(--text); font-family: 'Inter', sans-serif;
         margin: 0; display: flex; min-height: 100vh; }

  /* ── Sidebar ── */
  .sidebar { width: 230px; background: var(--sidebar); border-right: 1px solid var(--border);
             display: flex; flex-direction: column; position: fixed; top: 0; bottom: 0; z-index: 100; }
  .sidebar-brand { font-family: 'Rajdhani', sans-serif; font-size: 1.6rem; font-weight:700;
                   letter-spacing:2px; padding: 1.4rem 1.2rem; border-bottom: 1px solid var(--border); }
  .sidebar-brand span { color: var(--fuel); }
  .nav-section { font-size: .65rem; letter-spacing: 2px; color: var(--muted);
                 text-transform: uppercase; padding: .8rem 1.2rem .3rem; }
  .nav-link-item { display: flex; align-items: center; gap: .75rem; padding: .55rem 1.2rem;
                   color: var(--muted); text-decoration: none; font-size: .88rem; font-weight:500;
                   border-radius: 6px; margin: .1rem .6rem; transition: all .15s; }
  .nav-link-item:hover, .nav-link-item.active { background: var(--fuel-dim); color: var(--fuel); }
  .nav-link-item i { font-size: 1rem; width: 18px; text-align: center; }
  .sidebar-footer { margin-top: auto; padding: 1rem 1.2rem; border-top: 1px solid var(--border);
                    font-size: .8rem; color: var(--muted); }
  .user-badge { display:flex; align-items:center; gap:.5rem; margin-bottom:.5rem; }
  .user-avatar { width:30px; height:30px; background: var(--fuel-dim); border-radius:50%;
                 display:flex; align-items:center; justify-content:center; color:var(--fuel); font-size:.8rem; }
  .btn-logout { background:transparent; border:1px solid var(--border); color:var(--muted);
                font-size:.75rem; padding:.3rem .8rem; border-radius:5px; cursor:pointer;
                transition:.15s; width:100%; }
  .btn-logout:hover { border-color:var(--fuel); color:var(--fuel); }

  /* ── Main ── */
  .main-content { margin-left: 230px; flex: 1; padding: 1.8rem; }
  .page-header { margin-bottom: 1.5rem; }
  .page-header h1 { font-family: 'Rajdhani', sans-serif; font-size: 1.8rem; font-weight:700;
                    color: #fff; margin:0; letter-spacing:.5px; }
  .page-header p { color: var(--muted); margin:0; font-size: .85rem; }

  /* ── Cards ── */
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 1.2rem; }
  .stat-label { font-size: .73rem; letter-spacing:1.5px; color: var(--muted); text-transform:uppercase; margin-bottom:.3rem; }
  .stat-value { font-family: 'Rajdhani', sans-serif; font-size: 2rem; font-weight:700; color:#fff; }
  .stat-icon { width:44px; height:44px; border-radius:10px; display:flex; align-items:center;
               justify-content:center; font-size:1.2rem; }
  .data-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px;
               padding: 1.2rem; height:100%; }
  .data-card-title { font-family:'Rajdhani',sans-serif; font-size:1.1rem; font-weight:700; color:#fff;
                     margin-bottom: 1rem; display:flex; align-items:center; gap:.5rem; }

  /* ── Tables ── */
  .table { color: var(--text); }
  .table thead th { background: var(--border); color: var(--muted); font-size:.75rem;
                    letter-spacing:1px; text-transform:uppercase; border:none; padding:.7rem 1rem; }
  .table td { border-color: var(--border); padding:.65rem 1rem; font-size:.87rem; vertical-align:middle; }
  .table tbody tr:hover { background: rgba(255,255,255,.02); }
  .table-wrapper { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow:hidden; }

  /* ── Fuel bar ── */
  .tank-bar { height: 8px; background: var(--border); border-radius:4px; overflow:hidden; margin-top:.3rem; }
  .tank-fill { height:100%; border-radius:4px; transition: width .5s; }

  /* ── Badge ── */
  .badge-fuel { background: var(--fuel-dim); color: var(--fuel); padding:.3rem .7rem; border-radius:6px;
                font-size:.75rem; font-weight:600; }
  .badge-ok { background: rgba(34,197,94,.1); color: #22c55e; padding:.3rem .7rem; border-radius:6px; font-size:.75rem; }
  .badge-warn { background: rgba(234,179,8,.1); color: #eab308; padding:.3rem .7rem; border-radius:6px; font-size:.75rem; }
  .badge-danger { background: rgba(239,68,68,.1); color: #ef4444; padding:.3rem .7rem; border-radius:6px; font-size:.75rem; }

  /* ── Forms ── */
  .form-control, .form-select { background: #1e2330; border: 1px solid var(--border); color: #fff; border-radius:8px; }
  .form-control:focus, .form-select:focus { background:#1e2330; border-color:var(--fuel); color:#fff;
    box-shadow: 0 0 0 0.2rem rgba(255,107,0,.15); }
  .form-select option { background: #1e2330; }
  .form-label { color: var(--muted); font-size:.82rem; font-weight:500; margin-bottom:.3rem; }
  .btn-fuel { background: var(--fuel); color:#fff; border:none; border-radius:8px;
              font-family:'Rajdhani',sans-serif; font-weight:700; letter-spacing:.5px; transition:.2s; }
  .btn-fuel:hover { background:#e55f00; color:#fff; transform:translateY(-1px); }
  .btn-outline-fuel { background:transparent; border:1px solid var(--fuel); color:var(--fuel); border-radius:8px;
                      font-family:'Rajdhani',sans-serif; font-weight:700; transition:.2s; }
  .btn-outline-fuel:hover { background:var(--fuel); color:#fff; }

  /* ── Modal ── */
  .modal-content { background: var(--card); border: 1px solid var(--border); color: var(--text); }
  .modal-header { border-bottom: 1px solid var(--border); }
  .modal-footer { border-top: 1px solid var(--border); }
  .modal-title { font-family:'Rajdhani',sans-serif; font-size:1.2rem; color:#fff; }
  .btn-close { filter: invert(1); }

  /* ── Alert ── */
  .toast-area { position:fixed; bottom:1.5rem; right:1.5rem; z-index:9999; display:flex; flex-direction:column; gap:.5rem; }
  .psms-toast { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:.8rem 1.2rem;
                font-size:.85rem; animation: slideIn .2s ease; min-width:260px; }
  .psms-toast.success { border-left: 3px solid #22c55e; }
  .psms-toast.error   { border-left: 3px solid #ef4444; }
  @keyframes slideIn { from{transform:translateX(30px);opacity:0} to{transform:translateX(0);opacity:1} }
</style>
{% block extra_head %}{% endblock %}
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
  <div class="sidebar-brand">PS<span>MS</span></div>
  <nav style="padding:.5rem 0; overflow-y:auto; flex:1;">
    <div class="nav-section">Main</div>
    <a href="/dashboard" class="nav-link-item {% if request.path == '/dashboard' %}active{% endif %}">
      <i class="bi bi-speedometer2"></i> Dashboard
    </a>
    <a href="/pos" class="nav-link-item {% if request.path == '/pos' %}active{% endif %}">
      <i class="bi bi-receipt"></i> Point of Sale
    </a>
    <div class="nav-section">Operations</div>
    <a href="/inventory" class="nav-link-item {% if request.path == '/inventory' %}active{% endif %}">
      <i class="bi bi-droplet-half"></i> Inventory
    </a>
    <a href="/shifts" class="nav-link-item {% if request.path == '/shifts' %}active{% endif %}">
      <i class="bi bi-clock-history"></i> Shifts
    </a>
    {% if role == 'admin' %}
    <div class="nav-section">Admin</div>
    <a href="/reports" class="nav-link-item {% if request.path == '/reports' %}active{% endif %}">
      <i class="bi bi-bar-chart-line"></i> Reports
    </a>
    <a href="/employees" class="nav-link-item {% if request.path == '/employees' %}active{% endif %}">
      <i class="bi bi-people"></i> Employees
    </a>
    {% endif %}
  </nav>
  <div class="sidebar-footer">
    <div class="user-badge">
      <div class="user-avatar"><i class="bi bi-person-fill"></i></div>
      <div>
        <div style="color:#fff; font-size:.82rem; font-weight:600;">{{ name }}</div>
        <div style="font-size:.7rem; text-transform:capitalize;">{{ role }}</div>
      </div>
    </div>
    <button class="btn-logout" onclick="logout()"><i class="bi bi-box-arrow-right me-1"></i>Sign Out</button>
  </div>
</div>

<!-- Toast Area -->
<div class="toast-area" id="toastArea"></div>

<div class="main-content">
{% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
function showToast(msg, type='success') {
  const area = document.getElementById('toastArea');
  const t = document.createElement('div');
  t.className = `psms-toast ${type}`;
  t.innerHTML = `<i class="bi bi-${type==='success'?'check-circle':'exclamation-circle'} me-2"></i>${msg}`;
  area.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}
async function logout() {
  await fetch('/api/logout', {method:'POST', credentials:'include'});
  window.location.href = '/';
}
</script>
{% block scripts %}{% endblock %}
</body>
</html>
